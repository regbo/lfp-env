name: Test Scripts On Tag

on:
  push:
    tags:
      - "*"

jobs:
  unix-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run all unix test scripts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          unix_scripts=(tests/unix/test_*.sh)
          if [ "${#unix_scripts[@]}" -eq 0 ]; then
            echo "No unix test scripts found in tests/unix."
            exit 1
          fi
          for script in "${unix_scripts[@]}"; do
            echo "Running ${script}"
            bash "${script}"
          done

  detect-windows-tests:
    runs-on: ubuntu-latest
    outputs:
      has_windows_tests: ${{ steps.detect.outputs.has_windows_tests }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect windows test scripts
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          windows_scripts=(tests/windows/*.ps1 tests/windows/*.bat tests/windows/*.cmd)
          if [ "${#windows_scripts[@]}" -gt 0 ]; then
            echo "has_windows_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows_tests=false" >> "$GITHUB_OUTPUT"
          fi

  windows-tests:
    needs: detect-windows-tests
    if: needs.detect-windows-tests.outputs.has_windows_tests == 'true'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run windows test scripts
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path "tests/windows" -File -Include *.ps1,*.bat,*.cmd
          if ($scripts.Count -eq 0) {
            throw "No windows test scripts found in tests/windows."
          }
          foreach ($script in $scripts) {
            Write-Host "Running $($script.FullName)"
            switch ($script.Extension.ToLowerInvariant()) {
              ".ps1" { pwsh -NoProfile -File $script.FullName }
              ".bat" { cmd /c $script.FullName }
              ".cmd" { cmd /c $script.FullName }
              default { throw "Unsupported script extension: $($script.Extension)" }
            }
          }
