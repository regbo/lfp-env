name: Normalize README Repository Placeholder

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  normalize-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize raw GitHub URLs in README
        run: |
          if [ ! -f README.md ]; then
            exit 0
          fi
          sed -E -i \
            's#https://raw\.githubusercontent\.com/[^/]+/[^/]+/main/#https://raw.githubusercontent.com/\$\{GITHUB_REPOSITORY\}/main/#g' \
            README.md

      - name: Commit README changes if needed
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md already normalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: normalize README GitHub repository placeholder"
          git push
