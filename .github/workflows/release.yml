name: Tag Tests And Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: tag-tests-and-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unix-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate install.sh syntax
        shell: bash
        run: sh -n install.sh

      - name: Run Unix installer tests
        shell: bash
        run: sh tests/test-install.sh

  windows-tests:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate install.ps1 syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw "install.ps1"))

      - name: Run Windows installer tests
        shell: pwsh
        run: |
          .\tests\test-install.ps1

  release:
    needs:
      - unix-tests
      - windows-tests
    if: |
      always() &&
      needs.unix-tests.result == 'success' &&
      needs.windows-tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Update latest tag to released commit
        shell: bash
        run: |
          set -euo pipefail
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force
