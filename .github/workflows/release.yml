name: Tag Tests

on:
  push:
    tags:
      - "v*"

concurrency:
  group: tag-tests-and-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unix-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate install.sh syntax
        shell: bash
        run: sh -n install.sh

      - name: Run Unix installer tests
        shell: bash
        run: sh tests/test-install.sh

  windows-tests:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate install.ps1 syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw "install.ps1"))

      - name: Run Windows installer tests
        shell: pwsh
        run: |
          .\tests\test-install.ps1

