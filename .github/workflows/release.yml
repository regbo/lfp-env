name: Tag Tests And Release

on:
  push:
    tags:
      - "*"

concurrency:
  group: tag-tests-and-release
  cancel-in-progress: true

permissions:
  contents: write

env:
  ENV_LOCAL_INSTALL: "1"

jobs:
  discover-unix-tests:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.discover.outputs.scripts }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Discover unix test scripts
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          scripts_json="$(
            python -c 'import glob, json, sys; scripts = sorted(glob.glob("tests/unix/test_*.sh")); (print("No unix test scripts found in tests/unix.", file=sys.stderr), sys.exit(1)) if not scripts else print(json.dumps(scripts))'
          )"
          echo "scripts=${scripts_json}" >> "$GITHUB_OUTPUT"

  unix-tests:
    needs: discover-unix-tests
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.discover-unix-tests.outputs.scripts) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run unix test script
        shell: bash
        run: |
          set -euo pipefail
          echo "Running ${{ matrix.script }}"
          bash "${{ matrix.script }}"

  detect-windows-tests:
    runs-on: ubuntu-latest
    outputs:
      has_windows_tests: ${{ steps.detect.outputs.has_windows_tests }}
      scripts: ${{ steps.detect.outputs.scripts }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect windows test scripts
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          scripts_json="$(
            python -c 'import glob, json; patterns = ["tests/windows/test_*.ps1", "tests/windows/test_*.bat", "tests/windows/test_*.cmd"]; scripts = sorted(set(path for pattern in patterns for path in glob.glob(pattern))); print(json.dumps(scripts))'
          )"
          if [ "${scripts_json}" != "[]" ]; then
            echo "has_windows_tests=true" >> "$GITHUB_OUTPUT"
            echo "scripts=${scripts_json}" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows_tests=false" >> "$GITHUB_OUTPUT"
            echo "scripts=[]" >> "$GITHUB_OUTPUT"
          fi

  windows-tests:
    needs: detect-windows-tests
    if: needs.detect-windows-tests.outputs.has_windows_tests == 'true'
    runs-on: windows-latest
    env:
      LOG_LEVEL: debug
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.detect-windows-tests.outputs.scripts) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run windows test script
        shell: pwsh
        run: |
          $scriptPath = "${{ matrix.script }}"
          Write-Host "Running $scriptPath"
          switch ([System.IO.Path]::GetExtension($scriptPath).ToLowerInvariant()) {
            ".ps1" { pwsh -NoProfile -File $scriptPath }
            ".bat" { cmd /c $scriptPath }
            ".cmd" { cmd /c $scriptPath }
            default { throw "Unsupported script extension: $([System.IO.Path]::GetExtension($scriptPath))" }
          }

  build:
    needs:
      - unix-tests
      - detect-windows-tests
      - windows-tests
    if: |
      always() &&
      needs.unix-tests.result == 'success' &&
      (
        needs.detect-windows-tests.outputs.has_windows_tests != 'true' ||
        needs.windows-tests.result == 'success'
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lfp-env-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: lfp-env-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: lfp-env-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lfp-env-x86_64-pc-windows-msvc.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/lfp-env" "dist/lfp-env"
          tar -C dist -czf "dist/${{ matrix.asset_name }}" lfp-env

      - name: Package windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lfp-env.exe" "dist/lfp-env.exe" -Force
          Compress-Archive -Path "dist/lfp-env.exe" -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
