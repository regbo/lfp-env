name: Tag Tests And Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: tag-tests-and-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  unix-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise and toolchain
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Prebuild test binary
        shell: bash
        run: mise exec rust -- cargo build --bin lfp-env

      - name: Run unix Rust tests
        shell: bash
        run: mise exec rust -- cargo test

  windows-tests:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise and toolchain
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Prebuild test binary
        shell: pwsh
        run: mise exec rust -- cargo build --bin lfp-env

      - name: Run windows Rust tests
        shell: pwsh
        run: mise exec rust -- cargo test

  build:
    needs:
      - unix-tests
      - windows-tests
    if: |
      always() &&
      needs.unix-tests.result == 'success' &&
      needs.windows-tests.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: lfp-env-x86_64-unknown-linux-musl.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: lfp-env-aarch64-unknown-linux-musl.tar.gz
          - os: macos-26-intel
            target: x86_64-apple-darwin
            asset_name: lfp-env-x86_64-apple-darwin.tar.gz
          - os: macos-26
            target: aarch64-apple-darwin
            asset_name: lfp-env-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lfp-env-x86_64-pc-windows-msvc.zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_name: lfp-env-aarch64-pc-windows-msvc.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: contains(matrix.target, 'linux-musl')
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" == *"linux-musl" ]]; then
            cargo zigbuild --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Package unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/lfp-env" "dist/lfp-env"
          tar -C dist -czf "dist/${{ matrix.asset_name }}" lfp-env

      - name: Package windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lfp-env.exe" "dist/lfp-env.exe" -Force
          Compress-Archive -Path "dist/lfp-env.exe" -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag to released commit
        shell: bash
        run: |
          set -euo pipefail
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force
